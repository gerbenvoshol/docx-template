name: CI

on:
  push:
    branches: [ main, copilot/create-c-program-docx-template ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc make
    
    - name: Build docx-template-render
      run: |
        make clean
        make
    
    - name: Verify executable
      run: |
        ./docx-template-render --help
        test -f docx-template-render
        test -x docx-template-render
    
    - name: Run example test
      run: |
        make example
        test -f example/output.docx
    
    - name: Verify output
      run: |
        # Install unzip to extract and verify the DOCX output
        sudo apt-get install -y unzip
        unzip -p example/output.docx word/document.xml > /tmp/output.xml
        # Check that template variables were replaced
        grep -q "John Doe" /tmp/output.xml
        grep -q "Acme Corporation" /tmp/output.xml
        grep -q "Senior Software Engineer" /tmp/output.xml
        grep -q "95000" /tmp/output.xml
        echo "✓ All template variables were correctly replaced"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: docx-template-render
        path: |
          docx-template-render
          example/output.docx
